        name: get-menus-search
        description: Search menus
        call: new-york-public-library-whats-on-the-menu.get-menus-search
        outputParameters:
        - type: object
          mapping: $.
    - path: /dishes
      name: get-dishes
      operations:
      - method: GET
        name: get-dishes
        description: List dishes
        call: new-york-public-library-whats-on-the-menu.get-dishes
        outputParameters:
