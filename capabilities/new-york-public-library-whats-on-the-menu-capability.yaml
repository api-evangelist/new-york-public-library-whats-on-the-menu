naftiko: 1.0.0-alpha2
info:
  label: NYPL What's On The Menu API
  description: The New York Public Library's What's On The Menu API provides programmatic access to over 17,000 historical
    restaurant menus from the New York City area dating back to the 1850s. Explore menus, pages, and dishes including prices,
    names, dates, and full-text search across the dataset.
  tags:
  - New
  - York
  - Public
  - Library
  - Whats
  - 'On'
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: new-york-public-library-whats-on-the-menu
    baseUri: http://api.menus.nypl.org
    description: NYPL What's On The Menu API HTTP API.
    authentication:
      type: apikey
      in: query
      name: token
      value: '{{NEW_YORK_PUBLIC_LIBRARY_WHATS_ON_THE_MENU_TOKEN}}'
    resources:
    - name: menus
      path: /menus
      operations:
      - name: get-menus
        method: GET
        description: List menus
        inputParameters:
        - name: min_year
          in: query
          type: integer
        - name: max_year
          in: query
          type: integer
        - name: sort_by
          in: query
          type: string
        - name: status
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: menus-id
      path: /menus/{id}
      operations:
      - name: get-menus-id
        method: GET
        description: Get menu
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: menus-id-pages
      path: /menus/{id}/pages
      operations:
      - name: get-menus-id-pages
        method: GET
        description: Get menu pages
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: menus-id-dishes
      path: /menus/{id}/dishes
      operations:
      - name: get-menus-id-dishes
        method: GET
        description: Get menu dishes
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: menus-search
      path: /menus/search
      operations:
      - name: get-menus-search
        method: GET
        description: Search menus
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
        - name: sort_by
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dishes
      path: /dishes
      operations:
      - name: get-dishes
        method: GET
        description: List dishes
        inputParameters:
        - name: min_year
          in: query
          type: integer
        - name: max_year
          in: query
          type: integer
        - name: sort_by
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dishes-id
      path: /dishes/{id}
      operations:
      - name: get-dishes-id
        method: GET
        description: Get dish
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dishes-id-menus
      path: /dishes/{id}/menus
      operations:
      - name: get-dishes-id-menus
        method: GET
        description: Get menus for a dish
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dishes-search
      path: /dishes/search
      operations:
      - name: get-dishes-search
        method: GET
        description: Search dishes
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
        - name: sort_by
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
