  description: The NYPL What's On The Menu API exposes the full Menus dataset for programmatic exploration. Endpoints cover
    menus and their pages, dishes, search across both, and filtering by year, status, and other properties. Responses are
    JSON or XML. Token-based authentication is required (request access via menus@nypl.org). Daily rate limits and pagination
    headers are provided.
