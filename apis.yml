aid: new-york-public-library-whats-on-the-menu
name: New York Public Library What's On The Menu
description: The New York Public Library's What's On The Menu project is a digital collection that showcases over 17,000 historical
  restaurant menus from the New York City area dating back to the 1850s. The companion API provides programmatic access to
  menus, pages, and dishes including prices, names, dates, and full-text search. Token-based authentication is required and
  rate limits apply (5,000 requests/day, 2 requests/second).
